version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: falcon-routine-test-db
    environment:
      POSTGRES_USER: falcon_test
      POSTGRES_PASSWORD: falcon_test_password
      POSTGRES_DB: falcon_test
    ports:
      - "5433:5432" # Different port to avoid conflicts with database tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U falcon_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    container_name: falcon-routine-test-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
      - "6222:6222" # Cluster routes
    command: ["-js", "-m", "8222"] # Enable JetStream and monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
